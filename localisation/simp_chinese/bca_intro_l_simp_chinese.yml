l_simp_chinese:
 MESSAGE_BCA_STARTUP: "Better Colony Automation 通知"
 MESSAGE_BCA_STARTUP_desc: "§YBetter Colony Automation§! by 哇噗 & 红尘渡者\n\n本模组对自动托管功能进行了修复与改良。你可以通过['concept_colony']上的['concept_planet_automation']设置以及行星['concept_decision']与国家['concept_policies']来配置模组的具体行为。\n\n§H主要功能：§!\n- §Y智能规划：§! 根据星球特化方向自动规划和建造区块。最大化目标产出\n- §Y自动拆除：§! 必要时自动拆除不需要的 £building£ ['concept_buildings']、£district£ ['concept_district'] 与 £zone£ ['concept_district_specialization']\n- §Y更多§!：访问创意工坊以查看详情。\n\n§H注意§! ：§Y自动拆除§!是独立于['concept_planet_automation']的功能，默认开启，可通过行星['concept_decision']与国家['concept_policies']控制行为（官方未提供检测自动化是否开启的接口）\n\n当前模组作者对普政以外的国家游玩较少，欢迎反馈问题与意见！"

 
 MESSAGE_BCA_UPDATE: "Better Colony Automation 更新推送"
 MESSAGE_BCA_UPDATE_desc: "$MESSAGE_BCA_UPDATE_desc_verson$\n§H注意§!：本模组近期进行了大量更新，可访问创意工坊页面了解详情。\n$MESSAGE_BCA_STARTUP_desc_log$"
 MESSAGE_BCA_UPDATE_desc_verson: "§YBetter Colony Automation§! 更新到 v0.5"

MESSAGE_BCA_STARTUP_desc_log: "$MESSAGE_BCA_STARTUP_desc_log_v055$\n$MESSAGE_BCA_STARTUP_desc_log_v054$\n$MESSAGE_BCA_STARTUP_desc_log_v053$\n$MESSAGE_BCA_STARTUP_desc_log_v052$\n$MESSAGE_BCA_STARTUP_desc_log_v051$\n$MESSAGE_BCA_STARTUP_desc_log_v05$"

MESSAGE_BCA_STARTUP_desc_log_v055: "\n§Y2026-1-25 - v0.5.5§!：\n\t调整决策文本，增加可读性，并且同一决策的启用与禁用位置不再发生变化。添加了几个定制的决策图标以提升视觉效果；\n\t稀有资源建设调整：稀有资源决策将只会在工业特化星球上显示，对于一产区划，如果可以建设稀有资源建筑则会优先建设相关建筑，没有其他限制；\n\t修复了一些建筑没有矿物预留约束的问题。"
MESSAGE_BCA_STARTUP_desc_log_v054: "\n§Y2026-1-25 - v0.5.4§!：\n\t增加稀有资源建筑建设调整的决策；\n\t调整决策的文本和图案，使之更加易读；\n\t修复人口组装建筑在拆除的条件下依然被建造的问题，人口组装建筑现在需要在有多于一个建筑槽位且有空闲职位时才会被建造"
MESSAGE_BCA_STARTUP_desc_log_v053: "\n§Y2026-1-25 - v0.5.3§!：\n\t修复了由意外的命名错误导致的电能产出计算错误"
MESSAGE_BCA_STARTUP_desc_log_v052: "\n§Y2026-1-25 - v0.5.2§!：\n\t修复并改良了稀有资源建筑的自动化逻辑：建造远古精炼厂后不会再建造其他稀有资源建筑。\n\t修复了在机器人被禁用或选择了基因进化时仍然显示机器人组装选项的问题。"
MESSAGE_BCA_STARTUP_desc_log_v051: "\n§Y2026-1-14 - v0.5.1§!： \n\t修复电能产出的计算错误，导致城市比例偏低的问题。\n\t修复了一产区间进行转换时增益特化不进行拆除的问题"
MESSAGE_BCA_STARTUP_desc_log_v05: "\n§Y2026-1-24 - v0.5§!：\n\t重写§H一产区划建设与拆除§!逻辑，在§H存在一产增益特化§!时将自动调配城市区划与一产区划的比例以最大化产出，并且会自动建设一产增益特化"
