l_russian:
  MESSAGE_BCA_STARTUP: "Уведомление Better Colony Automation"
  MESSAGE_BCA_STARTUP_desc: "§YBetter Colony Automation§! от 哇噗\n\nЭтот мод исправляет и улучшает автоматизацию колоний. Настройте поведение через ['concept_planet_automation'] на ['concept_colony'], планетарные ['concept_decision'] и имперские ['concept_policies'].\n\n§HОсновные возможности:§!\n- §YУмное планирование:§! Автоматически планирует и строит районы в зависимости от обозначения планеты для максимизации целевых показателей\n- §YАвто-снос:§! Автоматически удаляет ненужные £building£ ['concept_buildings'], £district£ ['concept_district'] и £zone£ ['concept_district_specialization'] при необходимости\n- §YИ многое другое:§! Посетите страницу в мастерской для подробностей.\n\n§HПримечание§!: §YАвто-снос§! не зависит от ['concept_planet_automation'], включен по умолчанию и может быть отключен через интерфейс\n\nАвтор мода имеет ограниченный опыт игры за правительства, отличные от стандартных гражданских моделей; приветствуются отзывы и сообщения об ошибках!"

  MESSAGE_BCA_UPDATE: "Обновление Better Colony Automation"
  MESSAGE_BCA_UPDATE_desc: "$MESSAGE_BCA_UPDATE_desc_verson$\n$MESSAGE_BCA_UPDATE_desc_important$\n$MESSAGE_BCA_STARTUP_desc_log$"
  MESSAGE_BCA_UPDATE_desc_verson: "§YBetter Colony Automation§! обновлен до версии 1.2 !"
  MESSAGE_BCA_UPDATE_desc_important: "§HПримечание§!: Этот мод получил множество недавних обновлений; посетите страницу в мастерской для подробностей.\n§RПримечание§!: Этот мод теперь требует §1UI Overhaul Dynamic§! в качестве обязательного мода."
  MESSAGE_BCA_STARTUP_desc_log: "$MESSAGE_BCA_STARTUP_desc_log_v120$\n$MESSAGE_BCA_STARTUP_desc_log_v110$\n$MESSAGE_BCA_STARTUP_desc_log_v102$\n$MESSAGE_BCA_STARTUP_desc_log_v101$\n$MESSAGE_BCA_STARTUP_desc_log_v100$\n\n['concept_bca_prev_update_log']"

  MESSAGE_BCA_STARTUP_desc_log_v130: "\n§Y2026-2-28 - v1.3§!:\n\t- §GОптимизация производительности§!\n\t- Переписан авто-снос зданий, теперь он не зависит от модификации стандартных зданий, §Gнет конфликтов с модами, изменяющими стандартные здания§!\n\t- Добавлена поддержка сноса зданий, дающих только рабочие места (например, исследовательские лаборатории), чтобы освободить место для строительства продвинутых зданий\n\t- Исправлена ошибка, из-за которой в некоторых случаях останавливалось строительство специализаций"
  MESSAGE_BCA_STARTUP_desc_log_v120: "\n§Y2026-2-27 - v1.2§!: \n\t- Оптимизирован приоритет строительства зданий, предоставляющих рабочие места. Теперь такие здания строятся только когда нет свободных слотов районов\n\t- Исправлен список строительства зданий-монументов — теперь строятся только здания с лимитом 1 на планету\n\t- Добавлена поддержка сноса зон, установленных через настройки интерфейса\n\t- Уточнены параметры авто-сноса: добавлены отдельные опции для зданий, районов и зон ускорения\n\t- Исправлены проблемы с некорректным строительством специализаций\n\t- Когда доступно несколько планов районов для строительства, теперь выбор будет случайным, а не всегда в пользу одного и того же района\n\t- Исправлена ошибка, из-за которой панель управления отображалась в интерфейсе колонизации"
  MESSAGE_BCA_STARTUP_desc_log_v110: "\n§Y2026-2-26 - v1.1§!: \n\t- Поддержка версии 4.3\n\t- Из-за удаления городской ресурсной зоны в 4.3 соответствующая логика была значительно упрощена\n\t- Исправлены несколько проблем со строительством и сносом запланированных районов"
  MESSAGE_BCA_STARTUP_desc_log_v102: "\n§Y2026-2-22 - v1.0.2§!: \n\t- Теперь для специализаций £energy£ £minerals£ £food£ при включенном §Cавтоматическом управлении районами§! (§Hпо умолчанию§!), §Rдругие сельские районы будут заменяться§!! \n\t- Скорректирован приоритет строительства между городскими ресурсными зонами и первичными районами при отсутствии потребности в рабочих местах\n\t- Исправлена ошибка, вызывавшая избыточное строительство сельских районов на вулканических или диких планетах.\n\t- Удалены устаревшие локализации"
  MESSAGE_BCA_STARTUP_desc_log_v101: "\n§Y2026-2-20 - v1.0.1§!: \n\t- Исправлена ошибка, из-за которой строительство районов игнорировало потребность в рабочих местах.\n\t- Исправлена ошибка, из-за которой некоторые районы не строились до заданных лимитов.\n\t- Исправлена ошибка, из-за которой городские районы не могли быть заменены районами первичной специализации, когда районы были заполнены.\n\t- Добавлена поддержка строительства ресурсных зданий в рамках гибридного планирования."
  MESSAGE_BCA_STARTUP_desc_log_v100: "\n§Y2026-2-20 - v1.0§!: \n\t§YКрупное обновление§!:\n\t- Создан графический интерфейс для настройки гибридного планирования и строительства районов, удалены предыдущие типы планет для гибридного планирования.\n\t- Планеты с гибридным планированием теперь могут автоматически строить/заменять районы и возводить соответствующие здания.\n\t- Оптимизирована логика строительства усиливающих зданий — они также будут строиться при наличии свободных рабочих мест.\n\t- Переписана логика строительства для планет первичной специализации. Теперь первичная специализация автоматически выбирает оптимальные варианты строительства на основе окупаемости, и теперь поддерживается почти для всех типов планет."

  MESSAGE_BCA_STARTUP_desc_log_v055: "\n§Y2026-1-25 - v0.5.5§!: \n\tСкорректированы тексты решений для лучшей читаемости, позиции включения/отключения одного и того же решения больше не меняются. Добавлены несколько пользовательских иконок решений для улучшения визуального восприятия;\n\tКорректировка строительства редких ресурсов: решения по редким ресурсам теперь появляются только на планетах с промышленным обозначением, а для сельских районов, если можно построить здания редких ресурсов, соответствующие здания будут строиться в приоритетном порядке без дополнительных ограничений.\n\tИсправлены проблемы, из-за которых некоторым зданиям не хватало резервирования минералов."
  MESSAGE_BCA_STARTUP_desc_log_v054: "\n§Y2026-1-25 - v0.5.4§!: \n\tДобавлено решение для корректировки строительства зданий редких ресурсов;\n\tСкорректированы тексты и иконки решений для лучшей читаемости; исправлена проблема, из-за которой здания сборки населения все еще строились при условиях сноса. Теперь здания сборки населения требуют более одного свободного слота зданий и наличия свободных рабочих мест для строительства"
  MESSAGE_BCA_STARTUP_desc_log_v053: "\n§Y2026-1-25 - v0.5.3§!: \n\tИсправлена ошибка в расчете производства энергии, вызванная непреднамеренной ошибкой в названии"
  MESSAGE_BCA_STARTUP_desc_log_v052: "\n§Y2026-1-25 - v0.5.2§!: \n\tИсправлена и улучшена логика автоматизации зданий редких ресурсов: после постройки Археологического НПЗ другие здания редких ресурсов больше не будут строиться.\n\tИсправлена проблема, из-за которой опции сборки роботов все еще отображались в случаях, когда роботы запрещены или принято развитие искусственной эволюции."
  MESSAGE_BCA_STARTUP_desc_log_v051: "\n§Y2026-1-25 - v0.5.1§!: \n\tИсправлена ошибка в расчете производства энергии, из-за которой доля городских районов была слишком низкой.\n\tИсправлена проблема, из-за которой зоны ускорения не удалялись при преобразовании сельских районов."
  MESSAGE_BCA_STARTUP_desc_log_v05: "\n§Y2026-1-24 - v0.5§!: \n\tПереписана §Hлогика строительства и сноса сельских районов§!; при наличии сельской зоны ускорения мод будет автоматически перераспределять городские и сельские районы для максимизации выхода ресурсов"

  concept_bca_prev_update_log: "Предыдущие журналы обновлений"
  concept_bca_prev_update_log_desc: "$MESSAGE_BCA_STARTUP_desc_log_v055$\n$MESSAGE_BCA_STARTUP_desc_log_v054$\n$MESSAGE_BCA_STARTUP_desc_log_v053$\n$MESSAGE_BCA_STARTUP_desc_log_v052$\n$MESSAGE_BCA_STARTUP_desc_log_v051$\n$MESSAGE_BCA_STARTUP_desc_log_v05$"