l_english:
 MESSAGE_BCA_STARTUP: "Better Colony Automation Notification"
 MESSAGE_BCA_STARTUP_desc: "§YBetter Colony Automation§! by 哇噗 & 红尘渡者\n\nThis mod fixes and improves colony automation. Configure behavior via ['concept_planet_automation'] on ['concept_colony'], planet ['concept_decision'] and empire ['concept_policies'].\n\n§HMain features:§!\n- §YSmart Planning:§! Automatically plan and build districts based on planet designation to maximize target yields\n- §YAuto Demolition:§! Automatically remove unneeded £building£ ['concept_buildings'], £district£ ['concept_district'] and £zone£ ['concept_district_specialization'] when necessary\n- §YMore:§! Visit the Workshop page for details.\n\n§HNote§!: §YAuto Demolition§! is independent from ['concept_planet_automation'], enabled by default and can be toggled via the UI\n\nThe mod author has limited experience playing governments outside the vanilla civic; feedback and bug reports are welcome!"

 MESSAGE_BCA_UPDATE: "Better Colony Automation Update"
 MESSAGE_BCA_UPDATE_desc: "$MESSAGE_BCA_UPDATE_desc_verson$\n$MESSAGE_BCA_UPDATE_desc_important$\n$MESSAGE_BCA_STARTUP_desc_log$"
 MESSAGE_BCA_UPDATE_desc_verson: "§YBetter Colony Automation§! updated to v1.0 !"
 MESSAGE_BCA_UPDATE_desc_important: "£community_in_breach£ This MOD's workshop subscription will be retained for §K4.2§!; for subsequent updates please subscribe to the new workshop link (a redirect link is provided on this mod's workshop page)\n§HNote§!: This mod has received many recent updates; visit the Workshop page for details.\n§RNote§!: This MOD now requires §1UI Overhaul Dynamic§! as a prerequisite mod."
 MESSAGE_BCA_STARTUP_desc_log: "$MESSAGE_BCA_STARTUP_desc_log_v102$\n$MESSAGE_BCA_STARTUP_desc_log_v101$\n$MESSAGE_BCA_STARTUP_desc_log_v100$\n\n['concept_bca_prev_update_log']"

 MESSAGE_BCA_STARTUP_desc_log_v102: "\n§Y2026-2-22 - v1.0.2§!: \n\t- Now for £energy£ £minerals£ £food£ specialization with §Cauto district management§! enabled (§Hdefault§!), §Rother rural districts will be replaced§!! \n\t- Adjusted the construction priority between urban resource zone and primary districts when no job requirements exist\n\t- Fixed an error that caused overconstruction of rural districts on volcanic or wilderness planets.\n\t- Removed some outdated localizations"
 MESSAGE_BCA_STARTUP_desc_log_v101: "\n§Y2026-2-20 - v1.0.1§!: \n\t- Fixed an issue where district construction ignored job requirements.\n\t- Fixed an issue where some districts were not built up to their configured caps.\n\t- Fixed an issue where city districts could not be replaced by primary-specialization districts when districts were full.\n\t- Added hybrid-planning construction support for resource buildings."
 MESSAGE_BCA_STARTUP_desc_log_v100: "\n§Y2026-2-20 - v1.0§!: \n\t§YMajor update§!:\n\t- Created a GUI for setting hybrid planning and district construction, and removed the previous hybrid planning planet types.\n\t- Hybrid planning planets can automatically build/replace districts and construct corresponding buildings.\n\t- Optimized construction logic for boost buildings; they will also be built when free jobs exist.\n\t- Rewrote primary-specialization planet building logic. Primary specialization will now automatically select optimal construction options based on build returns, and now supports almost all planet types."

 MESSAGE_BCA_STARTUP_desc_log_v055: "\n§Y2026-1-25 - v0.5.5§!: \n\tAdjusted decision texts for better readability, and the enable/disable positions of the same decision will no longer change. Added several custom decision icons to enhance visual effects; \n\tRare resource construction adjustment: Rare resource decisions will only appear on industrial designation planets, and for rural districts, if rare resource buildings can be constructed, related buildings will be prioritized without other restrictions.\n\tFixed issues where some buildings lacked mineral reservation constraints."
 MESSAGE_BCA_STARTUP_desc_log_v054: "\n§Y2026-1-25 - v0.5.4§!: \n\tAdded decision for rare resource building construction adjustment; \n\tAdjusted decision texts and icons for better readability; fixed issue where pop assembly buildings were still constructed under demolition conditions, pop assembly buildings now require more than one building slot and free jobs to be constructed"
 MESSAGE_BCA_STARTUP_desc_log_v053: "\n§Y2026-1-25 - v0.5.3§!: \n\tFixed an energy output calculation error caused by an unintended naming mistake"
 MESSAGE_BCA_STARTUP_desc_log_v052: "\n§Y2026-1-25 - v0.5.2§!: \n\tFixed and improve rare resource building automation logic : after building the Archaeological Refinery, other rare resource buildings will no longer be built. \n\tFixed the robot assembly options still shows up for cases where robots are outlawed or engineered evolution is taken."
 MESSAGE_BCA_STARTUP_desc_log_v051: "\n§Y2026-1-25 - v0.5.1§!: \n\tFixed an error in energy output calculation that caused city district ratios to be too low. \n\tFixed an issue where boost zones were not removed during rural district conversion."
 MESSAGE_BCA_STARTUP_desc_log_v05: "\n§Y2026-1-24 - v0.5§!: \n\tRewrote §Hrural district construction and demolition§! logic; when a rural boost zone exists the mod will automatically rebalance city districts and rural districts to maximize output"

 concept_bca_prev_update_log: "Previous update logs"
 concept_bca_prev_update_log_desc: "$MESSAGE_BCA_STARTUP_desc_log_v055$\n$MESSAGE_BCA_STARTUP_desc_log_v054$\n$MESSAGE_BCA_STARTUP_desc_log_v053$\n$MESSAGE_BCA_STARTUP_desc_log_v052$\n$MESSAGE_BCA_STARTUP_desc_log_v051$\n$MESSAGE_BCA_STARTUP_desc_log_v05$"
